# Llama 3 70B experiment configuration (Together AI).
#
# Same domains, strategies, and repair settings as default.yaml. The model
# is the only difference.
#
# Prerequisites:
#   .env must contain TOGETHER_API_KEY.

experiment:
  name: "sil_env_bt_gen_llama"
  description: >
    Cross-model replication of the main experiment on Llama 3 70B Instruct
    via the Together AI OpenAI-compatible endpoint.
  repetitions: 10

model:
  name: "meta-llama/Llama-3.3-70B-Instruct-Turbo"
  provider: "compatible"
  base_url: null
  temperature: 0.7
  max_tokens: 4096
  seed: null

strategies:
  - zero_shot
  - few_shot_generic
  - proposed
  - proposed_with_few_shot

repair:
  enabled: true
  max_iterations: 3

domains_include: "_domains.yaml"
