# GPT-4 experiment configuration.
#
# Each expected behavior in the included domains file carries:
#   text     - human-readable description (not shown to the LLM)
#   source   - citation for the requirement
#   category - coarse label used by the structured-feedback repair
#   keywords - required + any_of token sets for coverage matching
#
# Coverage is never fed back to the LLM. The structured-feedback repair
# only addresses structural errors (BT.CPP load failures, malformed nodes).

experiment:
  name: "sil_env_bt_gen"
  description: >
    Compare prompting strategies for environment-object behavior repertoire
    BTs. Each strategy is evaluated both raw and after a structured-feedback
    repair pass.
  repetitions: 10

model:
  name: "gpt-4"
  provider: null            # auto-inferred from model name
  base_url: null
  temperature: 0.7
  max_tokens: 4096
  seed: null

strategies:
  - zero_shot
  - few_shot_generic
  - proposed
  - proposed_with_few_shot

repair:
  enabled: true
  max_iterations: 3

domains_include: "_domains.yaml"
